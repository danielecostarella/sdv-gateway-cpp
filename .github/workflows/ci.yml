name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Build and test (native, Debug)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            nlohmann-json3-dev \
            libspdlog-dev \
            libgtest-dev \
            ca-certificates

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure -j"$(nproc)"

  # ---------------------------------------------------------------------------
  # Job 2: Static analysis with clang-tidy
  # ---------------------------------------------------------------------------
  lint:
    name: Static Analysis
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang \
            clang-tidy \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            nlohmann-json3-dev \
            libspdlog-dev \
            ca-certificates

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      # Generate proto headers before running clang-tidy — the kuksa
      # client includes generated files that must exist at analysis time.
      - name: Generate proto headers
        run: cmake --build build --target kuksa-proto -j"$(nproc)"

      - name: Run clang-tidy
        run: |
          find src -name "*.cpp" \
            ! -name "placeholder.cpp" \
            | xargs clang-tidy -p build

  # ---------------------------------------------------------------------------
  # Job 3: Docker build (verifies the containerized build works)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain

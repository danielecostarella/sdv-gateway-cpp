---
# SDV Gateway — local development stack
#
# Services:
#   kuksa-databroker  Eclipse Kuksa Databroker (VSS signal store)
#   gateway           sdv-gateway-cpp (CAN → VSS → gRPC feeder)
#   can-simulator     Injects synthetic CAN frames into vcan0
#
# Usage:
#   docker compose up
#
# The gateway container creates vcan0 in its network namespace (via
# docker-entrypoint.sh with CAP_NET_ADMIN + CAP_SYS_MODULE).
# The can-simulator shares that namespace (network_mode: service:gateway)
# so both processes read/write the same virtual CAN interface.
#
# Both gateway and can-simulator are built from the same image (root
# Dockerfile, runtime stage). The can-simulator service overrides CMD.

services:

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    command: ["--insecure"]   # TLS disabled for local dev (see ADR-001)
    ports:
      - "55555:55555"
    restart: unless-stopped

  gateway:
    build:
      context: .
      target: runtime
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./config:/app/config:ro
    environment:
      KUKSA_ENDPOINT: "kuksa-databroker:55555"
    depends_on:
      - kuksa-databroker
    restart: unless-stopped

  can-simulator:
    build:
      context: .
      target: runtime
    # Shares the gateway network namespace → same vcan0 interface
    network_mode: "service:gateway"
    command: ["./can-simulator", "--interface", "vcan0", "--interval", "100"]
    depends_on:
      - gateway
    restart: unless-stopped
